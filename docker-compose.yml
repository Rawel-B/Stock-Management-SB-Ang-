services:
  mongo:
    image: mongo:7
    container_name: dsm-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: dsm-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/dsm
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200,http://localhost:8080,http://127.0.0.1:8080
      APP_JWT_SECRET: local-development-secret-key-change-before-production
      APP_JWT_EXPIRATION: 86400000
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: dsm-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mongo-data:
