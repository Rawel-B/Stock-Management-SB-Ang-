<main class="auth-page compact-auth-page">
  <section class="auth-card" aria-label="Forgot password form">
    <div class="auth-card-brand">
      <div class="brand-mark small-brand-mark">
        <span>DSM</span>
      </div>
      <strong>DSM</strong>
    </div>

    <div class="auth-card-header">
      <h2>Forgot password</h2>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <label>
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="email" />
      </label>
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <p class="field-error">Enter a valid email address.</p>
      }

      @if (message()) {
        <p class="form-success">{{ message() }}</p>
      }

      @if (error()) {
        <p class="form-error">{{ error() }}</p>
        <button class="secondary-button" type="button" (click)="supportOpen.set(!supportOpen())">
          Open access ticket
        </button>
      }

      <button class="primary-button" type="submit" [disabled]="loading()">
        {{ loading() ? 'Resetting password...' : 'Reset password' }}
      </button>
    </form>

    @if (supportOpen()) {
      <form [formGroup]="ticketForm" (ngSubmit)="createTicket()" class="auth-form access-ticket-form">
        <label>
          <span>Email</span>
          <input type="email" formControlName="email" autocomplete="email" />
        </label>
        <label>
          <span>Issue</span>
          <textarea formControlName="description"></textarea>
        </label>
        @if (ticketMessage()) {
          <p class="form-success">{{ ticketMessage() }}</p>
        }
        <button class="primary-button" type="submit" [disabled]="ticketLoading()">
          {{ ticketLoading() ? 'Sending...' : 'Send ticket' }}
        </button>
      </form>
    }

    <p class="auth-switch"><a routerLink="/auth/signin">Back to sign in</a></p>
  </section>
</main>
